<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — I-had-a-bad-idea</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <script>
    // Initialize theme from localStorage or system preference
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme = savedTheme || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  </script>
  <div class="container">
    <nav>
      <div>
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="skills.html">Skills</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
        <a href="https://github.com/I-had-a-bad-idea" target="_blank" rel="noopener">GitHub</a>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <span id="themeIcon">☾</span>
      </button>
    </nav>

    <header>
      <h1>Contact</h1>
      <p>How to reach me and where to find my work.</p>
    </header>

    <section>
      <h2>Open for contact</h2>
      <p>
        Currently the best way to reach me is via GitHub.
      </p>
      <p>
        <a href="https://github.com/I-had-a-bad-idea" target="_blank" rel="noopener">github.com/I-had-a-bad-idea</a>
      </p>
    </section>

  </div>

  <script>
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const html = document.documentElement;

    function updateThemeIcon() {
      const currentTheme = html.getAttribute('data-theme');
      themeIcon.textContent = currentTheme === 'dark' ? '☼' : '☾';
    }

    themeToggle.addEventListener('click', () => {
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon();
    });

    updateThemeIcon();
  </script>
</body>
</html>
